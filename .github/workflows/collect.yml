name: Collect SNI

on:
  schedule:
    # Daily at 06:23 UTC. SNI candidates change slowly, so hourly is unnecessary.
    - cron: "23 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect-sni
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect and test SNI candidates
        run: python collect.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sni index.json
          if git diff --staged --quiet; then
            echo "No SNI list changes this run."
          else
            git commit -m "Update SNI lists ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
